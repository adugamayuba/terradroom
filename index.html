<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terradroom — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Unbounded:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-deep:   #0a1a0f;
      --green-mid:    #0f2d18;
      --green-accent: #1a5c2e;
      --green-bright: #2d9653;
      --gold:         #c9a84c;
      --gold-light:   #e8c878;
      --white:        #f5f5f0;
      --muted:        rgba(245, 245, 240, 0.45);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--green-deep);
      font-family: 'Inter', sans-serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── Ambient background ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(45, 150, 83, 0.18) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      animation: drift1 18s ease-in-out infinite alternate;
    }

    .bg-orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.12) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: drift2 22s ease-in-out infinite alternate;
    }

    .bg-orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(26, 92, 46, 0.22) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 80px) scale(1.15); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-50px, -60px) scale(1.1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
    }

    /* ── Grid overlay ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(45, 150, 83, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 150, 83, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Noise texture ── */
    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── Top badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
      backdrop-filter: blur(8px);
      background: rgba(201, 168, 76, 0.06);
      animation: fadeDown 1s ease both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Wordmark ── */
    .wordmark {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 12vw, 9.5rem);
      letter-spacing: -0.02em;
      line-height: 0.95;
      background: linear-gradient(
        135deg,
        #f5f5f0 0%,
        #c9e8d4 30%,
        #2d9653 60%,
        #c9a84c 85%,
        #e8c878 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1s ease 0.2s both;
      position: relative;
    }

    .wordmark::after {
      content: 'TERRADROOM';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        #f5f5f0 0%,
        #c9e8d4 30%,
        #2d9653 60%,
        #c9a84c 85%,
        #e8c878 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(40px);
      opacity: 0.4;
      z-index: -1;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2.2rem auto;
      animation: fadeUp 1s ease 0.4s both;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      animation: fadeUp 1s ease 0.5s both;
    }

    .tagline strong {
      color: rgba(245, 245, 240, 0.75);
      font-weight: 400;
    }

    /* ── Email ── */
    .email-wrap {
      margin-top: 2.8rem;
      animation: fadeUp 1s ease 0.7s both;
    }

    .email-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      font-weight: 400;
      padding: 12px 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 100px;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.04);
      transition: border-color 0.3s, background 0.3s, color 0.3s;
    }

    .email-link:hover {
      border-color: rgba(201, 168, 76, 0.5);
      background: rgba(201, 168, 76, 0.07);
      color: var(--gold-light);
    }

    .email-icon {
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .email-link:hover .email-icon {
      opacity: 1;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245, 245, 240, 0.22);
      z-index: 1;
      white-space: nowrap;
      animation: fadeUp 1s ease 1s both;
    }

    .footer a {
      color: rgba(245, 245, 240, 0.35);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer a:hover {
      color: rgba(245, 245, 240, 0.7);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .badge { font-size: 0.6rem; }
      .tagline { font-size: 0.82rem; }
      .email-link { font-size: 0.78rem; padding: 10px 22px; }
    }
  </style>
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="grid-overlay"></div>
  <div class="noise"></div>

  <main class="content">

    <div class="badge">
      <span class="badge-dot"></span>
      Coming Soon
    </div>

    <h1 class="wordmark">TERRADROOM</h1>

    <div class="divider"></div>

    <p class="tagline">
      The future of <strong>agriculture</strong> is being cultivated.<br />
      Something extraordinary is growing.
    </p>

    <div class="email-wrap">
      <a href="mailto:hi@terradroom.com" class="email-link">
        <svg class="email-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        hi@terradroom.com
      </a>
    </div>

  </main>

  <footer class="footer">
    A <a href="https://softdroom.com" target="_blank" rel="noopener">Softdroom Holdings</a> company
  </footer>

</body>
</html>
