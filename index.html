<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terradroom — Coming Soon</title>
  <meta name="description" content="Terradroom — An Agritech subsidiary of Softdroom Holdings. Something extraordinary is growing." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold:       #c9a84c;
      --gold-light: #e8c97a;
      --cream:      #f5f0e8;
      --white:      #ffffff;
      --muted:      rgba(245, 240, 232, 0.5);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── Hero background image ── */
    .bg-image {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=2000&q=80');
      background-size: cover;
      background-position: center;
      animation: slow-zoom 22s ease-in-out infinite alternate;
    }

    @keyframes slow-zoom {
      from { transform: scale(1);    filter: brightness(0.72); }
      to   { transform: scale(1.06); filter: brightness(0.65); }
    }

    /* Dark overlay */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.42) 40%,
        rgba(0,0,0,0.72) 100%
      );
    }

    /* Grain texture */
    .bg-grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(201, 168, 76, 0.7);
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0%   { transform: translateY(0)       scale(1);   opacity: 0; }
      8%   { opacity: 0.5; }
      88%  { opacity: 0.1; }
      100% { transform: translateY(-110vh)  scale(0.3); opacity: 0; }
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      gap: 0;
    }

    /* Eyebrow line */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fade-down 0.9s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
    }

    .eyebrow-line {
      width: 36px;
      height: 1px;
      background: var(--gold);
      opacity: 0.7;
    }

    .eyebrow-text {
      font-size: 0.65rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--gold-light);
      font-weight: 500;
    }

    /* Brand name */
    .brand {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(4.5rem, 15vw, 13rem);
      line-height: 0.9;
      letter-spacing: -0.025em;
      position: relative;
      opacity: 0;
      animation: reveal-up 1.1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .brand span {
      display: inline-block;
      background: linear-gradient(
        160deg,
        #ffffff 0%,
        #f5f0e8 35%,
        #e8c97a 65%,
        #c9a84c 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Animated underline */
    .brand-underline {
      display: block;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.6rem auto 0;
      animation: expand-line 1s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
    }

    @keyframes expand-line {
      to { width: 100%; }
    }

    /* Tagline */
    .tagline {
      font-size: clamp(0.82rem, 1.8vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.07em;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.8;
      margin-top: 2.4rem;
      opacity: 0;
      animation: fade-up 0.9s cubic-bezier(0.22,1,0.36,1) 0.85s forwards;
    }

    .tagline strong {
      color: var(--cream);
      font-weight: 500;
    }

    /* Email CTA */
    .email-wrap {
      margin-top: 3rem;
      opacity: 0;
      animation: fade-up 0.9s cubic-bezier(0.22,1,0.36,1) 1.05s forwards;
    }

    .email-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 34px;
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 100px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      color: var(--cream);
      text-decoration: none;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color 0.35s, background 0.35s, transform 0.3s, box-shadow 0.35s;
    }

    .email-link:hover {
      border-color: rgba(201, 168, 76, 0.8);
      background: rgba(201, 168, 76, 0.12);
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(201,168,76,0.15);
    }

    .email-link svg {
      opacity: 0.75;
      flex-shrink: 0;
      transition: opacity 0.3s;
    }

    .email-link:hover svg {
      opacity: 1;
    }

    /* ── Softdroom Holdings centered ── */
    .softdroom {
      margin-top: 3.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fade-up 0.9s cubic-bezier(0.22,1,0.36,1) 1.3s forwards;
    }

    .softdroom-sep {
      width: 1px;
      height: 28px;
      background: linear-gradient(180deg, transparent, rgba(201,168,76,0.45), transparent);
    }

    .softdroom-text {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.38);
      font-weight: 400;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 2rem;
      font-size: 0.64rem;
      letter-spacing: 0.1em;
      color: rgba(245, 240, 232, 0.2);
      opacity: 0;
      animation: fade-up 0.8s ease 1.6s forwards;
    }

    /* ── Keyframes ── */
    @keyframes reveal-up {
      from { opacity: 0; transform: translateY(36px) skewY(1.5deg); }
      to   { opacity: 1; transform: translateY(0)    skewY(0deg); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .brand {
        font-size: clamp(3.4rem, 20vw, 5.5rem);
      }
      .email-link {
        padding: 13px 24px;
        font-size: 0.76rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="bg-grain"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Main content -->
  <main class="content">

    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Agritech</span>
      <span class="eyebrow-line"></span>
    </div>

    <h1 class="brand">
      <span>Terradroom</span>
      <span class="brand-underline"></span>
    </h1>

    <p class="tagline">
      Something <strong>extraordinary</strong> is growing.<br />
      The future of agriculture is almost here.
    </p>

    <div class="email-wrap">
      <a href="mailto:hi@terradroom.com" class="email-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        hi@terradroom.com
      </a>
    </div>

    <div class="softdroom">
      <span class="softdroom-sep"></span>
      <span class="softdroom-text">A Softdroom Holdings Company</span>
    </div>

  </main>

  <footer>&copy; 2026 Terradroom. All rights reserved.</footer>

  <script>
    // Floating gold particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 32; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size     = Math.random() * 3 + 1;
      const left     = Math.random() * 100;
      const delay    = Math.random() * 16;
      const duration = Math.random() * 14 + 12;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${left}%;  bottom:-10px;
        animation-delay:${delay}s;
        animation-duration:${duration}s;
      `;
      container.appendChild(p);
    }

    // Parallax brand on mouse move
    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      const brand = document.querySelector('.brand');
      if (brand) {
        brand.style.transform = `translate(${dx * -8}px, ${dy * -5}px)`;
      }
    });
  </script>
</body>
</html>
